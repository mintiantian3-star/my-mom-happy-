<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母亲节精致翻页本</title>
    <style>
        @font-face {
            font-family: 'CustomFont';
            src: url('https://file.icve.com.cn/file_doc/qdqqd/4451773237935948.ttf');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background-color: #fce4ec; font-family: "STKaiti", "楷体", serif; perspective: 2000px; overflow: hidden;
        }

        .bg-style {
            background-image: url('https://mintiantian3-star.github.io/my-mom-happy/bg.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }

        .cover-bg {
            background-image: url('./cover.jpg');
            background-size: cover; background-position: center;
        }

        .book-container { position: relative; width: 340px; height: 480px; transform-style: preserve-3d; }

        /* 封面 */
        .book-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 12px; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #d81b60;
            box-shadow: 5px 15px 35px rgba(0,0,0,0.2); transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s 0.6s;
            transform-origin: left; border: 4px dashed rgba(216, 27, 96, 0.2); box-sizing: border-box;
        }
        .book-cover.opened { transform: rotateY(-135deg); opacity: 0; pointer-events: none; }

        .latch-group { position: absolute; right: -24px; top: 50%; transform: translateY(-50%); cursor: pointer; z-index: 2001; }
        .latch-tab { width: 48px; height: 30px; background: #e91e63; border-radius: 0 15px 15px 0; display: flex; align-items: center; justify-content: center; }
        .button-svg-wrap { width: 18px; height: 18px; background: #d81b60; border-radius: 50%; border: 1px solid white; display: flex; align-items: center; justify-content: center; }

        /* 页面系统 */
        .page {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 12px; padding: 35px 25px;
            box-sizing: border-box; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: left;
            backface-visibility: hidden; border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .page {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    border-radius: 12px;
    padding: 35px 25px;
    box-sizing: border-box;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: left;
    backface-visibility: hidden;
    border: 1px solid rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
        }
        .page.flipped { transform: rotateY(-178deg); z-index: 0 !important; }

        .custom-font-page, .custom-font-page * { font-family: 'CustomFont', "STKaiti", "楷体", sans-serif !important; }

        .letter-text { color: #444; line-height: 1.8; font-size: 0.95rem; white-space: pre-wrap; margin: auto 0; width: 100%; text-align: center; }

        /* 第一页特定排版 - 修复气泡与角标 */
        .speech-bubble {
            position: relative; background: rgba(255, 240, 243, 0.95); border: 2px solid #ff8fa3; border-radius: 15px;
            padding: 10px 14px; width: 200px; font-size: 0.9rem; color: #d81b60; line-height: 1.4; margin-bottom: 30px;
            z-index: 10;
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -12px; left: 30px; 
            border-width: 12px 12px 0 0; border-style: solid;
            border-color: #ff8fa3 transparent transparent transparent;
        }
        .main-gif { width: 160px; border-radius: 10px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-top: 5px; }
        .options-container { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
        .option-btn { background: rgba(255, 236, 240, 0.9); border: 1.5px solid #ff8fa3; color: #e91e63; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }

        /* 强制弹窗 */
        .custom-alert { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 5000; }
        .alert-box { background: white; padding: 20px; border-radius: 15px; text-align: center; width: 250px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        /* 解密遮罩 */
        .lock-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(80, 80, 80, 0.9);
            z-index: 1500; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: opacity 0.6s ease;
        }
        .lock-icon {
            width: 70px; height: 70px; cursor: pointer; background: #d4af37; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 35px; border: 3px solid #fff; box-shadow: 0 0 20px gold; margin-bottom: 15px; transition: transform 0.2s;
        }
        .lock-icon:active { transform: scale(0.9); }

        /* 音乐播放器 */
        .disc { width: 140px; height: 140px; border-radius: 50%; border: 5px solid #ff8fa3; display: flex; align-items: center; justify-content: center; position: relative; margin: 20px 0; }
        .disc::after { content: '🎵'; font-size: 50px; animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }
        .music-ctrl { cursor: pointer; width: 55px; height: 55px; fill: #e91e63; transition: transform 0.2s; }
        .music-ctrl:active { transform: scale(0.9); }

        .page-num { position: absolute; bottom: 15px; right: 20px; color: #888; font-size: 0.75rem; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 60px; color: #e91e63; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2500; font-size: 35px; text-shadow: 0 0 5px white; }
        .btn-left { left: 5px; } .btn-right { right: 5px; } .hidden { visibility: hidden; opacity: 0; }
    </style>
</head>
<body>

    <audio id="bg-music" src="https://files.catbox.moe/8jpptq.mp3" loop preload="auto"></audio>

    <div class="custom-alert" id="alert-modal">
        <div class="alert-box">
            <p style="color:#d81b60; margin-bottom:15px; font-weight:bold;">不行！不够惊喜！<br>要选够惊喜的！！</p>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="option-btn" onclick="closeAlert()">好的👌</button>
                <button class="option-btn" onclick="closeAlert()">OK👌</button>
            </div>
        </div>
    </div>

    <div class="book-container">
        <div class="book-cover cover-bg" id="cover">
            <span style="font-size: 50px;">💐</span>
            <h2 style="margin: 10px 0;">致最爱的妈妈</h2>
            <p style="font-size: 0.9rem; font-style: italic;">Special Edition for Mother's Day</p>
            <div class="latch-group" onclick="openBook()">
                <div class="latch-tab">
                    <div class="button-svg-wrap">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                            <circle cx="12" cy="12" r="10" /><circle cx="9" cy="9" r="1" fill="white"/><circle cx="15" cy="9" r="1" fill="white"/><circle cx="9" cy="15" r="1" fill="white"/><circle cx="15" cy="15" r="1" fill="white"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div id="pages-box">
            <div class="page bg-style custom-font-page" id="first-page" style="z-index: 100;">
                <div class="speech-bubble" id="bubble-text">亲爱的妈妈，母亲节快乐！</div>
                <img src="https://s3plus.meituan.net/opapisdk/op_ticket_1_5677168484_1778327896066_JqiVSRgR.gif" class="main-gif" onclick="showOptions()">
                <div class="options-container" id="options">
                    <div class="option-btn" onclick="forceSurprise()">惊喜！</div>
                    <div class="option-btn" onclick="realGoNext()">非常无敌惊喜！</div>
                </div>
                <div class="page-num" id="p-num-1">1 / 13</div>
            </div>

            <div class="lock-overlay" id="letter-lock" style="display: none;">
                <div class="lock-icon" id="main-lock-btn" onclick="unlockLetter()">🔒</div>
                <p style="text-align:center; line-height:1.6;">这是一封加密的信件<br>点击解开锁扣并开启音乐</p>
            </div>
        </div>

        <div id="prev" class="nav-btn btn-left hidden" onclick="goPrev()">&lt;</div>
        <div id="next" class="nav-btn btn-right hidden" onclick="goNext()">&gt;</div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        
        const letterChunks = [
            `亲爱的妈妈:\n        母亲节快乐！\n        之前都常常无视了母亲节……觉得这些节日或许不是很重要，毕竟我们家从来没什么仪式感。\n        这次想写主要是想好好聊聊，平时确实没什么时间好聊的。\n        而且特别容易吵起来……\n        T^T我不想吵架。\n…… ……\n我时常在想一些复杂的事情。\n比如，家庭。`,
            `这是从我想起小时候同时牵过您跟爸爸的手时才恍然想起来的东西，当时我不懂，我以为会永远这样下去。\n如今我才觉得我们就像是一个昙花，绽放的时间太短了，短到来不及反应。\n当时您多么爱我，我也多么爱您。\n即使我只记得一闪而过的片段，也依然能感受到当时的和睦。\n…… ……`,
            `不记得是什么时候了，幼小的我心疼您，想要帮你分担一些家务，于是我就想去洗碗，您把我推开，说以后再帮。\n当时我在想，以后吗？我不确定以后会不会了，也许吧。\n这里我记得深刻，也许是因为我是想记着这个承诺的。\n…… ……`,
            `我记得你们开过一个小卖部，说是小卖部也不太确定，因为当时我觉得那里实在空旷，空到货架少少的，商品也少，我说我要喝可乐的声音都能听到回音。\n却又实在狭小，狭小到床上需要挤三个人。\n我只觉得床太挤了。\n有一回我发烧了，您让去床上躺着，只有我一个，足够大，我忽地在想，为什么不换个房子呢？这样就不挤了。\n我想不明白。\n当然，现在我也想不明白为什么当时要拿着个奶瓶到门口喝，可能无聊吧。`,
            `…………\n还有在江西的日子。\n云溪花园，我记得。\n我太讨厌了，因为那是我第一次产生忮忌。\n妹妹夺走了您属于我的注意力，我讨厌。\n您说姐姐要让着妹妹，我讨厌。\n您当时总偏向妹妹，我讨厌。\n但是我现在不讨厌了。\n毕竟手心手背都是肉，您的选择我理解，您的想法我也理解。\n我谁也不讨厌了，但我就是放不下。\n…… ……`,
            `后来您重新偏向我了。\n我又对妹妹产生一丝丝愧疚。\n却又权当被我无视了，也被您无视了。\n所以爸爸和亲戚才会更偏向她。\n我现在明白了。\n…… ……\n回忆像湖面，旧思荡起旧涟漪。\n …… ……`,
            `我从前时常心疼您，但我做什么您都不太满意。\n以前母亲节我送过贺卡与一些不实用的东西，您说以后不要再送了。\n我确实没送过了。\n无非就是觉得您嫌弃、不满，这种情绪似乎是对向我的。\n直到某天翻找被藏的手机的时候，找到了您守着的贺卡，我的、妹妹的，每一个都没落下。\n原来您是爱着我的。\n…… ……`,
            `我有时认为我们命运险衅，实在太苦，太难了。\n所以我会逃避，把不满、嫉妒、厌恶写进本子里。\n您也在逃避，拥有信仰，往往是承受不住的开始。\n您跟姑姑信佛、信极乐世界、信众生平等、信苦乐自渡，何尝不是说服自己呢？\n我小时候意识到了这个问题，所以我太讨厌佛了，也讨厌僧人。\n现在我也说不清楚为什么，但也隐约约察觉了些。\n并且我也意识到了一个严重的问题，您过的苦涩。\n…… ……`,
            `我把苦的缘由归咎到了自己身上。\n把穷的原因推搡到我自己身上。\n所以我恨自己。\n但是我爱您。\n…… ……\n中国人是含蓄的。\n这句话我信了。\n因为我们既不能表达自己爱意，也不能表达难过，只能无端的逃走，然后思来想去觉得这样好像不对，又隐喻的表达自己的歉意。\n所以我想对您说对不起，但请不要原谅我。\n由我产生的爱与恨，本就应该由我承担。\n…… ……`,
            `苦涩从我们个人，慢慢蔓延到整个家庭。\n我偶尔觉得家里实在太窒息了，说不清为什么，但我知道的是家里每一个人都觉得窒息。\n像是责任的锁链缠绕在每个人的脖颈上，把我们绑得紧紧的，挣脱不开。\n所以您说要离婚，要离开这里，我真的是为您感到高兴和幸福。\n因为我也想离开。\n\n完。`
        ];

        const pagesBox = document.getElementById('pages-box');
        const totalPages = letterChunks.length + 3; 
        document.getElementById('p-num-1').innerText = `1 / ${totalPages}`;

        // 渲染信件页 (2-11)
        letterChunks.forEach((text, i) => {
            const num = i + 2;
            const p = document.createElement('div');
            p.className = 'page bg-style' + (num <= 3 ? ' custom-font-page' : '');
            p.style.zIndex = totalPages - num + 1;
            p.innerHTML = `<div class="letter-text">${text}</div><div class="page-num">${num} / ${totalPages}</div>`;
            pagesBox.appendChild(p);
        });

        // 播放器页 (12)
        const musicPage = document.createElement('div');
        musicPage.className = 'page bg-style';
        musicPage.style.zIndex = 2;
        musicPage.innerHTML = `
            <h3 style="color:#d81b60; margin-top:20px;">专属背景音乐</h3>
            <div style="margin: auto 0; display:flex; flex-direction:column; align-items:center;">
                <div class="disc" id="disc-anim"></div>
                <div onclick="toggleMusic()" style="margin-top:10px;">
                    <svg id="svg-pause" class="music-ctrl" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    <svg id="svg-play" class="music-ctrl" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
                </div>
                <p style="color:#888; font-size:0.8rem; margin-top:15px;">正在播放: 母亲节特别曲目</p>
            </div>
            <div class="page-num">${totalPages - 1} / ${totalPages}</div>
        `;
        pagesBox.appendChild(musicPage);

        // 重新开始页 (13)
        const finalPage = document.createElement('div');
        finalPage.className = 'page bg-style';
        finalPage.style.zIndex = 1;
        finalPage.innerHTML = `
            <div style="margin:auto 0;">
                <span style="font-size:60px;">💖</span>
                <h2 style="color:#d81b60;">妈妈，我爱您</h2>
                <p style="color:#444; line-height:2;">愿岁月温柔待您<br>往后余生，幸福安康。</p>
                <button onclick="location.reload()" style="background:#e91e63;border:none;color:white;padding:12px 25px;border-radius:25px;cursor:pointer;margin-top:30px;box-shadow:0 5px 15px rgba(233,30,99,0.3);">重新开启</button>
            </div>
            <div class="page-num">${totalPages} / ${totalPages}</div>
        `;
        pagesBox.appendChild(finalPage);

        const cover = document.getElementById('cover');
        const options = document.getElementById('options');
        const alertModal = document.getElementById('alert-modal');
        const lock = document.getElementById('letter-lock');
        let topIndex = totalPages - 1;

        function openBook() { 
            cover.classList.add('opened'); 
            audio.load(); // 预加载音频
        }
        function showOptions() {
            document.getElementById('bubble-text').innerText = "我第一次以这种形式这么庆祝您母亲节快乐，惊不惊喜⌯ᵔ⩊ᵔ⌯ಣ";
            options.style.opacity = "1"; options.style.pointerEvents = "auto";
            audio.play().then(() => audio.pause()); // 激活音频上下文
        }
        function forceSurprise() { alertModal.style.display = 'flex'; }
        function closeAlert() { alertModal.style.display = 'none'; }

        function realGoNext() {
            const all = document.querySelectorAll('.page');
            all[0].classList.add('flipped');
            topIndex--;
            lock.style.display = 'flex';
        }

        function unlockLetter() {
            document.getElementById('main-lock-btn').innerText = "🔓";
            audio.play(); 
            setTimeout(() => {
                lock.style.opacity = "0";
                setTimeout(() => { lock.style.display = "none"; updateNav(); }, 600);
            }, 400);
        }

        function toggleMusic() {
            const p = document.getElementById('svg-pause');
            const pl = document.getElementById('svg-play');
            const disc = document.getElementById('disc-anim');
            if (audio.paused) {
                audio.play(); p.style.display = 'block'; pl.style.display = 'none'; disc.style.animationPlayState = 'running';
            } else {
                audio.pause(); p.style.display = 'none'; pl.style.display = 'block'; disc.style.animationPlayState = 'paused';
            }
        }

        function updateNav() {
            if (topIndex === totalPages - 1) return;
            document.getElementById('prev').classList.toggle('hidden', topIndex === totalPages - 1);
            document.getElementById('next').classList.toggle('hidden', topIndex === 0);
        }

        function goNext() {
            const all = document.querySelectorAll('.page');
            if (topIndex > 0) {
                all[totalPages - 1 - topIndex].classList.add('flipped');
                topIndex--; updateNav();
            }
        }

        function goPrev() {
            const all = document.querySelectorAll('.page');
            if (topIndex < totalPages - 1) {
                topIndex++;
                all[totalPages - 1 - topIndex].classList.remove('flipped');
                updateNav();
            }
        }
    </script>
</body>
</html>
